name: mylo
description: Mylo Super App by Sphere — Everything in your Sphere
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.8.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Storage
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # WebSocket
  web_socket_channel: ^3.0.2

  # WebRTC voice/video calls
  flutter_webrtc: ^0.12.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Supabase
  supabase_flutter: ^2.8.4

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  mime: ^2.0.0
  qr_flutter: ^4.1.0

  # WebView (browser module)
  webview_flutter: 4.7.0

  # Video playback
  video_player: ^2.9.2

  # Security
  local_auth: ^2.3.0
  crypto: ^3.0.3

  # Google Sign-In

  # Utils
  timeago: ^3.7.0
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
