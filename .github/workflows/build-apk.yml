name: Build Mylo APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────────────────────
      # GENERATE ANDROID PROJECT
      # ─────────────────────────────────────────────────────────
      - name: Buat struktur Android project
        working-directory: mobile
        run: |
          flutter create /tmp/flutter_init \
            --org com.spherehq \
            --project-name mylo \
            --platforms android \
            --quiet
          cp -r /tmp/flutter_init/android ./android

      # ─────────────────────────────────────────────────────────
      # ANDROID MANIFEST — izin lengkap (kamera, mic, storage, dll)
      # ─────────────────────────────────────────────────────────
      - name: Pasang AndroidManifest dengan izin lengkap
        working-directory: mobile
        run: |
          cp android_manifest_template.xml android/app/src/main/AndroidManifest.xml
          echo "AndroidManifest.xml dipasang"
          cat android/app/src/main/AndroidManifest.xml | grep "uses-permission" | wc -l
          echo "baris uses-permission"

      # ─────────────────────────────────────────────────────────
      # FIREBASE
      # ─────────────────────────────────────────────────────────
      - name: Setup Firebase
        working-directory: mobile
        shell: bash
        run: |
          set -e
          cp google-services.json android/app/google-services.json

          SETTINGS=""
          [ -f android/settings.gradle.kts ] && SETTINGS="android/settings.gradle.kts"
          [ -z "$SETTINGS" ] && [ -f android/settings.gradle ] && SETTINGS="android/settings.gradle"

          APP_GRADLE=""
          [ -f android/app/build.gradle.kts ] && APP_GRADLE="android/app/build.gradle.kts"
          [ -z "$APP_GRADLE" ] && [ -f android/app/build.gradle ] && APP_GRADLE="android/app/build.gradle"

          echo "Settings: $SETTINGS | App gradle: $APP_GRADLE"

          # Tambah Google Services plugin ke settings.gradle
          if [ -n "$SETTINGS" ] && ! grep -q "com.google.gms.google-services" "$SETTINGS"; then
            if [[ "$SETTINGS" == *.kts ]]; then
              awk '/id\("com\.android\.application"\)/ && !d {
                print; print "    id(\"com.google.gms.google-services\") version \"4.4.2\" apply false"; d=1; next
              } { print }' "$SETTINGS" > "$SETTINGS.new" && mv "$SETTINGS.new" "$SETTINGS"
            else
              awk '/id ["'"'"']com\.android\.application["'"'"']/ && !d {
                print; print "    id \"com.google.gms.google-services\" version \"4.4.2\" apply false"; d=1; next
              } { print }' "$SETTINGS" > "$SETTINGS.new" && mv "$SETTINGS.new" "$SETTINGS"
            fi
          fi

          # Apply plugin di app/build.gradle
          if [ -n "$APP_GRADLE" ] && ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            if [[ "$APP_GRADLE" == *.kts ]]; then
              awk '/^plugins[[:space:]]*\{/ && !d {
                print; print "    id(\"com.google.gms.google-services\")"; d=1; next
              } { print }' "$APP_GRADLE" > "$APP_GRADLE.new" && mv "$APP_GRADLE.new" "$APP_GRADLE"
            else
              awk '/^plugins[[:space:]]*\{/ && !d {
                print; print "    id \"com.google.gms.google-services\""; d=1; next
              } { print }' "$APP_GRADLE" > "$APP_GRADLE.new" && mv "$APP_GRADLE.new" "$APP_GRADLE"
            fi
          fi

          # Fix minSdkVersion ke 21
          if [ -n "$APP_GRADLE" ]; then
            if [[ "$APP_GRADLE" == *.kts ]]; then
              sed -i 's/minSdk\s*=\s*.*/minSdk = 21/' "$APP_GRADLE" || true
            else
              sed -i 's/minSdkVersion\s.*/minSdkVersion 21/' "$APP_GRADLE" || true
            fi
          fi

          # Pasang ndkVersion di android {} block (BUKAN di defaultConfig).
          # Ganti baris `ndkVersion = flutter.ndkVersion` jika sudah ada;
          # jika belum, sisipkan setelah baris `compileSdk = ...`.
          if [ -n "$APP_GRADLE" ]; then
            if [[ "$APP_GRADLE" == *.kts ]]; then
              if grep -q 'ndkVersion[[:space:]]*=' "$APP_GRADLE"; then
                sed -i 's|ndkVersion[[:space:]]*=.*|ndkVersion = "27.0.12077973"|' "$APP_GRADLE"
              else
                sed -i '/compileSdk[[:space:]]*=/a\    ndkVersion = "27.0.12077973"' "$APP_GRADLE"
              fi
            else
              if grep -q 'ndkVersion' "$APP_GRADLE"; then
                sed -i 's|ndkVersion.*|ndkVersion "27.0.12077973"|' "$APP_GRADLE"
              else
                sed -i '/compileSdkVersion/a\    ndkVersion "27.0.12077973"' "$APP_GRADLE"
              fi
            fi
            echo "=== Gradle setelah patch ==="
            grep -n "minSdk\|ndkVersion\|compileSdk" "$APP_GRADLE" || true
          fi

      # ─────────────────────────────────────────────────────────
      # SIGNING CONFIG — decode keystore dari secrets dan paksa
      # SEMUA build type (debug + release) pakai signing yang sama
      # supaya tidak ada signature mismatch antar build / antar APK.
      # ─────────────────────────────────────────────────────────
      - name: Setup release signing
        working-directory: mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -e

          # Decode keystore dari base64
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/mylo-release.p12

          # Buat key.properties
          cat > android/key.properties << EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=mylo-release.p12
          storeType=PKCS12
          EOF

          echo "Keystore siap ($(wc -c < android/app/mylo-release.p12) bytes)"

          # Patch app/build.gradle agar pakai signing config
          APP_GRADLE=""
          [ -f android/app/build.gradle.kts ] && APP_GRADLE="android/app/build.gradle.kts"
          [ -z "$APP_GRADLE" ] && [ -f android/app/build.gradle ] && APP_GRADLE="android/app/build.gradle"

          if [ -n "$APP_GRADLE" ]; then
            if [[ "$APP_GRADLE" == *.kts ]]; then
              # Patch Kotlin DSL
              python3 - "$APP_GRADLE" << 'PYEOF'
          import sys, re
          path = sys.argv[1]
          with open(path) as f:
              content = f.read()

          # 1. Tambah import Properties di paling atas file kalau belum ada.
          #    java.util.Properties() tidak bisa dipakai langsung di dalam
          #    android { } block karena Kotlin coba resolve `java` sebagai
          #    member dari Android extension.
          if 'import java.util.Properties' not in content:
              content = 'import java.util.Properties\n' + content

          # 2. Sisipkan deklarasi keyProps di FILE SCOPE (sebelum android { })
          #    bukan di dalam android { }. rootProject.file("key.properties")
          #    karena rootProject untuk Flutter android module = folder android/.
          file_scope_block = '''
          val keyProps = Properties()
          val keyPropsFile = rootProject.file("key.properties")
          if (keyPropsFile.exists()) {
              keyPropsFile.inputStream().use { keyProps.load(it) }
          }

          '''
          if 'val keyProps' not in content:
              content = re.sub(r'(android\s*\{)', file_scope_block + r'\1', content, count=1)

          # 3. Sisipkan signingConfigs block di awal android { } kalau belum ada
          signing_block = '''
              signingConfigs {
                  create("release") {
                      storeFile = file(keyProps.getProperty("storeFile") ?: "mylo-release.p12")
                      storePassword = keyProps.getProperty("storePassword") ?: ""
                      keyAlias = keyProps.getProperty("keyAlias") ?: "mylo"
                      keyPassword = keyProps.getProperty("keyPassword") ?: ""
                      storeType = "PKCS12"
                  }
              }
          '''
          if 'signingConfigs {' not in content and 'signingConfigs{' not in content:
              content = re.sub(r'(android\s*\{)', r'\1' + signing_block, content, count=1)

          # 4. Paksa SEMUA referensi signingConfig (debug & release) ke release keystore
          #    Flutter create defaultnya: signingConfig = signingConfigs.getByName("debug")
          content = re.sub(
              r'signingConfig\s*=\s*signingConfigs\.getByName\([^)]*\)',
              'signingConfig = signingConfigs.getByName("release")',
              content
          )

          # 5. Kalau release { } block tidak punya signingConfig sama sekali, tambahkan
          if not re.search(r'release\s*\{[^}]*signingConfig', content, re.DOTALL):
              content = re.sub(
                  r'(release\s*\{)',
                  r'\1\n            signingConfig = signingConfigs.getByName("release")',
                  content
              )

          with open(path, 'w') as f:
              f.write(content)
          print("build.gradle.kts patched")
          PYEOF
            else
              # Patch Groovy DSL
              python3 - "$APP_GRADLE" << 'PYEOF'
          import sys, re
          path = sys.argv[1]
          with open(path) as f:
              content = f.read()

          signing_block = '''
              def keyProps = new java.util.Properties()
              def keyFile = rootProject.file('key.properties')
              if (keyFile.exists()) {
                  keyFile.withInputStream { keyProps.load(it) }
              }
              signingConfigs {
                  release {
                      storeFile     file(keyProps['storeFile'] ?: 'mylo-release.p12')
                      storePassword keyProps['storePassword'] ?: ''
                      keyAlias      keyProps['keyAlias'] ?: 'mylo'
                      keyPassword   keyProps['keyPassword'] ?: ''
                      storeType     'PKCS12'
                  }
              }
          '''

          if 'signingConfigs {' not in content and 'signingConfigs{' not in content:
              content = re.sub(r'(android\s*\{)', r'\1' + signing_block, content, count=1)

          # Paksa semua signingConfig ke release
          content = re.sub(
              r'signingConfig\s+signingConfigs\.\w+',
              'signingConfig signingConfigs.release',
              content
          )

          if not re.search(r'release\s*\{[^}]*signingConfig', content, re.DOTALL):
              content = re.sub(
                  r'(release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  content
              )

          with open(path, 'w') as f:
              f.write(content)
          print("build.gradle patched")
          PYEOF
            fi

            echo "=== signingConfig setelah patch ==="
            grep -n "signingConfig" "$APP_GRADLE" || true
          fi

      # ─────────────────────────────────────────────────────────
      # BUILD
      # versionCode dinaikkan otomatis pakai run_number supaya
      # tiap APK punya versionCode unik (Android wajib begini
      # untuk update). build-name tetap dari pubspec.
      # ─────────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analisis kode
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK release (split per ABI + signed)
        working-directory: mobile
        run: |
          flutter build apk --release --split-per-abi \
            --build-number=${{ github.run_number }} \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      - name: Build APK release (universal / fat APK)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      # ─────────────────────────────────────────────────────────
      # UPLOAD ARTIFACTS — hanya APK release (semua signed key sama)
      # Tidak upload debug APK lagi karena beda signature dengan
      # release → bikin user gagal install kalau campur.
      # ─────────────────────────────────────────────────────────
      - name: Upload APK universal (semua HP — paling aman)
        uses: actions/upload-artifact@v4
        with:
          name: mylo-universal-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK arm64-v8a (HP modern)
        uses: actions/upload-artifact@v4
        with:
          name: mylo-arm64-release
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK armeabi-v7a (HP lama)
        uses: actions/upload-artifact@v4
        with:
          name: mylo-armeabi-release
          path: mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK x86_64 (emulator)
        uses: actions/upload-artifact@v4
        with:
          name: mylo-x86_64-release
          path: mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # GITHUB RELEASE OTOMATIS
  # ─────────────────────────────────────────────────────────
  release:
    name: Buat GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download semua APK
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Ambil versi dari pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Mylo ${{ steps.version.outputs.tag }}"
          body: |
            ## Mylo App — Build Otomatis

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Build:** #${{ github.run_number }} (versionCode = ${{ github.run_number }})

            ---

            ### Download APK

            | File | Untuk Perangkat |
            |------|----------------|
            | `app-release.apk` | **Universal — pasti jalan di HP apa pun** (paling aman, ukuran lebih besar) |
            | `app-arm64-v8a-release.apk` | HP modern 2019+ (ukuran lebih kecil) |
            | `app-armeabi-v7a-release.apk` | HP lama / 32-bit |
            | `app-x86_64-release.apk` | Emulator / Chromebook |

            ---

            ### PENTING — Cara Install (baca dulu kalau "Apl tidak terpasang")

            1. **Kalau pernah install Mylo build LAMA dari sebelum tanggal rilis ini, UNINSTALL dulu** dari HP Anda. Build lama ditandatangani dengan key yang berbeda, jadi Android akan menolak update.
            2. Download APK sesuai HP Anda. Kalau ragu, pakai **`app-release.apk`** (universal, pasti jalan).
            3. Buka **Pengaturan → Keamanan → Instal aplikasi tidak dikenal** → aktifkan untuk browser/file manager Anda.
            4. Buka file APK → Install.
            5. Saat install, Android akan menampilkan daftar izin yang diminta app:
               - Kamera — untuk foto profil & unggah gambar
               - Mikrofon — untuk pesan suara & panggilan
               - Foto & Media — untuk memilih gambar dari galeri
               - Notifikasi — untuk pesan & update real-time
               - Biometrik — untuk login dengan sidik jari / Face ID
               - Lokasi — untuk fitur berbasis lokasi (opsional)

            > APK ini sudah ditandatangani dengan release keystore resmi Mylo.
            > Mulai dari build ini ke depan, update bisa langsung install tanpa uninstall — semua build pakai signature & versionCode yang konsisten.
          files: |
            apks/mylo-universal-release/app-release.apk
            apks/mylo-arm64-release/app-arm64-v8a-release.apk
            apks/mylo-armeabi-release/app-armeabi-v7a-release.apk
            apks/mylo-x86_64-release/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
