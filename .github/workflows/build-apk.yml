name: Build Mylo APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Buat struktur Android project
        working-directory: mobile
        run: |
          flutter create /tmp/flutter_init \
            --org com.spherehq \
            --project-name mylo \
            --platforms android \
            --quiet
          cp -r /tmp/flutter_init/android ./android

      - name: Setup Firebase di Android project
        working-directory: mobile
        shell: bash
        run: |
          set -e
          cp google-services.json android/app/google-services.json

          echo "=== Generated Android files ==="
          ls -la android/
          ls -la android/app/

          # === Detect file types (Flutter 3.27 may use .gradle or .kts) ===
          SETTINGS=""
          [ -f android/settings.gradle.kts ] && SETTINGS="android/settings.gradle.kts"
          [ -z "$SETTINGS" ] && [ -f android/settings.gradle ] && SETTINGS="android/settings.gradle"

          APP_GRADLE=""
          [ -f android/app/build.gradle.kts ] && APP_GRADLE="android/app/build.gradle.kts"
          [ -z "$APP_GRADLE" ] && [ -f android/app/build.gradle ] && APP_GRADLE="android/app/build.gradle"

          echo "Settings: $SETTINGS"
          echo "App gradle: $APP_GRADLE"

          # === 1) Declare plugin in settings.gradle pluginManagement plugins block ===
          if [ -n "$SETTINGS" ] && ! grep -q "com.google.gms.google-services" "$SETTINGS"; then
            if [[ "$SETTINGS" == *.kts ]]; then
              awk '
                /id\("com\.android\.application"\)/ && !d {
                  print; print "    id(\"com.google.gms.google-services\") version \"4.4.2\" apply false"; d=1; next
                }
                { print }
              ' "$SETTINGS" > "$SETTINGS.new" && mv "$SETTINGS.new" "$SETTINGS"
            else
              awk '
                /id ["'"'"']com\.android\.application["'"'"']/ && !d {
                  print; print "    id \"com.google.gms.google-services\" version \"4.4.2\" apply false"; d=1; next
                }
                { print }
              ' "$SETTINGS" > "$SETTINGS.new" && mv "$SETTINGS.new" "$SETTINGS"
            fi
            echo "$SETTINGS: patched"
            echo "--- $SETTINGS now ---"
            cat "$SETTINGS"
          fi

          # === 2) Apply plugin in app-level build.gradle plugins block ===
          if [ -n "$APP_GRADLE" ] && ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            if [[ "$APP_GRADLE" == *.kts ]]; then
              awk '
                /^plugins[[:space:]]*\{/ && !d { print; print "    id(\"com.google.gms.google-services\")"; d=1; next }
                { print }
              ' "$APP_GRADLE" > "$APP_GRADLE.new" && mv "$APP_GRADLE.new" "$APP_GRADLE"
            else
              awk '
                /^plugins[[:space:]]*\{/ && !d { print; print "    id \"com.google.gms.google-services\""; d=1; next }
                { print }
              ' "$APP_GRADLE" > "$APP_GRADLE.new" && mv "$APP_GRADLE.new" "$APP_GRADLE"
            fi
            echo "$APP_GRADLE: patched"
            echo "--- $APP_GRADLE now ---"
            cat "$APP_GRADLE"
          fi

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analisis kode
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Build APK (debug)
        working-directory: mobile
        run: |
          flutter build apk --debug \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      - name: Build APK split per ABI (release)
        working-directory: mobile
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: mylo-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload APK arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: mylo-arm64-release
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: mylo-armeabi-release
          path: mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK x86_64
        uses: actions/upload-artifact@v4
        with:
          name: mylo-x86_64-release
          path: mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  release:
    name: Buat GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download semua APK
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Ambil versi dari pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Buat Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Mylo ${{ steps.version.outputs.tag }}"
          body: |
            ## Mylo App — Build Otomatis

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Build:** #${{ github.run_number }}

            ### Download APK
            | File | Perangkat |
            |------|-----------|
            | `app-arm64-v8a-release.apk` | HP modern (disarankan) |
            | `app-armeabi-v7a-release.apk` | HP lama |
            | `app-x86_64-release.apk` | Emulator / Chromebook |
            | `app-debug.apk` | Testing / Debug |

            ### Cara Install
            1. Download APK sesuai perangkat
            2. Aktifkan **Instal dari sumber tidak dikenal** di pengaturan HP
            3. Install APK, selesai!
          files: |
            apks/mylo-debug-apk/app-debug.apk
            apks/mylo-arm64-release/app-arm64-v8a-release.apk
            apks/mylo-armeabi-release/app-armeabi-v7a-release.apk
            apks/mylo-x86_64-release/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
