name: Build Mylo APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Buat struktur Android project
        working-directory: mobile
        run: |
          flutter create /tmp/flutter_init \
            --org com.spherehq \
            --project-name mylo \
            --platforms android \
            --quiet
          cp -r /tmp/flutter_init/android ./android

      - name: Setup Firebase di Android project
        working-directory: mobile
        shell: bash
        run: |
          set -e
          cp google-services.json android/app/google-services.json

          # --- Patch project-level build.gradle(.kts): tambah plugin classpath/declaration ---
          PROJECT_GRADLE=""
          if [ -f android/build.gradle.kts ]; then PROJECT_GRADLE="android/build.gradle.kts"; fi
          if [ -z "$PROJECT_GRADLE" ] && [ -f android/build.gradle ]; then PROJECT_GRADLE="android/build.gradle"; fi

          if [ -n "$PROJECT_GRADLE" ]; then
            if grep -q "com.google.gms.google-services" "$PROJECT_GRADLE"; then
              echo "$PROJECT_GRADLE: already patched"
            else
              if [[ "$PROJECT_GRADLE" == *.kts ]]; then
                printf '\n// Google Services plugin untuk Firebase\nplugins {\n    id("com.google.gms.google-services") version "4.4.2" apply false\n}\n' >> "$PROJECT_GRADLE"
              else
                printf '\napply plugin: %s\n' "'com.google.gms.google-services'" >> "$PROJECT_GRADLE"
              fi
              echo "$PROJECT_GRADLE: patched"
            fi
          fi

          # --- Patch settings.gradle.kts (Flutter modern): tambah plugin di pluginManagement plugins block ---
          if [ -f android/settings.gradle.kts ]; then
            if ! grep -q "com.google.gms.google-services" android/settings.gradle.kts; then
              # Sisipkan setelah baris dengan id("com.android.application")
              awk '
                /id\("com.android.application"\)/ && !done {
                  print
                  print "    id(\"com.google.gms.google-services\") version \"4.4.2\" apply false"
                  done=1
                  next
                }
                { print }
              ' android/settings.gradle.kts > android/settings.gradle.kts.new
              mv android/settings.gradle.kts.new android/settings.gradle.kts
              echo "settings.gradle.kts: patched"
            fi
          fi

          # --- Patch app-level build.gradle(.kts): aktifkan plugin di apps's plugins block ---
          APP_GRADLE=""
          if [ -f android/app/build.gradle.kts ]; then APP_GRADLE="android/app/build.gradle.kts"; fi
          if [ -z "$APP_GRADLE" ] && [ -f android/app/build.gradle ]; then APP_GRADLE="android/app/build.gradle"; fi

          if [ -n "$APP_GRADLE" ]; then
            if grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
              echo "$APP_GRADLE: already patched"
            else
              if [[ "$APP_GRADLE" == *.kts ]]; then
                # Insert id() inside the first plugins { block
                awk '
                  /^plugins[[:space:]]*\{/ && !done {
                    print
                    print "    id(\"com.google.gms.google-services\")"
                    done=1
                    next
                  }
                  { print }
                ' "$APP_GRADLE" > "$APP_GRADLE.new"
                mv "$APP_GRADLE.new" "$APP_GRADLE"
              else
                printf "\napply plugin: 'com.google.gms.google-services'\n" >> "$APP_GRADLE"
              fi
              echo "$APP_GRADLE: patched"
            fi
          fi

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: mobile
        run: |
          flutter build apk --debug \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      - name: Build APK split per ABI (release)
        working-directory: mobile
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_URL=https://mylo-production-5516.up.railway.app

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: mylo-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload APK arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: mylo-arm64-release
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: mylo-armeabi-release
          path: mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK x86_64
        uses: actions/upload-artifact@v4
        with:
          name: mylo-x86_64-release
          path: mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  release:
    name: Buat GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download semua APK
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Ambil versi dari pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Buat Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Mylo ${{ steps.version.outputs.tag }}"
          body: |
            ## Mylo App — Build Otomatis

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Build:** #${{ github.run_number }}

            ### Download APK
            | File | Perangkat |
            |------|-----------|
            | `app-arm64-v8a-release.apk` | HP modern (disarankan) |
            | `app-armeabi-v7a-release.apk` | HP lama |
            | `app-x86_64-release.apk` | Emulator / Chromebook |
            | `app-debug.apk` | Testing / Debug |

            ### Cara Install
            1. Download APK sesuai perangkat
            2. Aktifkan **Instal dari sumber tidak dikenal** di pengaturan HP
            3. Install APK, selesai!
          files: |
            apks/mylo-debug-apk/app-debug.apk
            apks/mylo-arm64-release/app-arm64-v8a-release.apk
            apks/mylo-armeabi-release/app-armeabi-v7a-release.apk
            apks/mylo-x86_64-release/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
