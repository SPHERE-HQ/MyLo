name: Build Backend Dart

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    name: Compile & Analyze Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: backend
        run: dart pub get

      - name: Analisis kode backend
        working-directory: backend
        run: dart analyze --fatal-infos

      - name: Compile server (AOT)
        working-directory: backend
        run: dart compile exe bin/server.dart -o server-linux-x64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mylo-backend-linux
          path: backend/server-linux-x64
          retention-days: 14
